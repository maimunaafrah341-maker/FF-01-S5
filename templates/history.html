<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice History</title>

  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:#f4f4f8;
      padding:2rem;
      color:#1e1b4b;
    }

    h1{
      margin-bottom:1.5rem;
    }

    .table-wrap{
      background:white;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(0,0,0,.06);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#4f46e5;
      color:white;
      text-align:left;
      padding:14px;
      font-size:14px;
    }

    td{
      padding:14px;
      border-bottom:1px solid #eee;
      font-size:14px;
    }

    tr:last-child td{
      border-bottom:none;
    }

    .download{
      color:#4f46e5;
      text-decoration:none;
      font-weight:600;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:1.5rem;
    }

    .back-btn{
      text-decoration:none;
      color:white;
      background:#4f46e5;
      padding:10px 14px;
      border-radius:10px;
      font-size:14px;
      font-weight:600;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>Invoice History</h1>

  <a href="/" class="back-btn">
    + New Invoice
  </a>
</div>

<div class="table-wrap">

<table>

  <tr>
    <th>Invoice ID</th>
    <th>Client</th>
    <th>Total</th>
    <th>Download</th>
  </tr>

  {% for invoice in invoices %}
  <tr>
    <td>{{ invoice[0] }}</td>
    <td>{{ invoice[1] }}</td>
    <td>₹{{ invoice[2] }}</td>

    <td>
      <a class="download"
         href="/download/{{ invoice[3] }}">
         Download
      </a>
    </td>
  </tr>
  {% endfor %}

</table>

</div>

</body>
</html>
