<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Generated</title>

  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:#f4f4f8;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      color:#1e1b4b;
    }

    .card{
      background:white;
      padding:2rem;
      border-radius:18px;
      width:420px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      text-align:center;
    }

    .icon{
      font-size:60px;
      margin-bottom:1rem;
    }

    h1{
      font-size:24px;
      margin-bottom:.5rem;
    }

    p{
      color:#6b7280;
      font-size:14px;
      margin-bottom:1rem;
    }

    .invoice-box{
      background:#eef2ff;
      border-radius:12px;
      padding:1rem;
      margin:1rem 0;
      text-align:left;
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin-bottom:.5rem;
      font-size:14px;
    }

    .label{ color:#6b7280; }
    .value{ font-weight:600; }

    .auto-note{
      background:#f0fdf4;
      border:1px solid #bbf7d0;
      border-radius:10px;
      padding:.75rem 1rem;
      font-size:13px;
      color:#033717;
      margin-bottom:1rem;
    }

    .countdown{
      font-weight:700;
      font-size:15px;
    }

    .btn-group{
      display:flex;
      flex-direction:column;
      gap:.75rem;
      margin-top:1rem;
    }

    .download-btn,
    .print-btn{
      display:inline-block;
      padding:12px 18px;
      border-radius:10px;
      font-weight:600;
      font-size:14px;
      text-decoration:none;
      transition:.2s;
      cursor:pointer;
      border:none;
      width:100%;
      box-sizing:border-box;
    }

    .download-btn{
      background:#4f46e5;
      color:white;
    }

    .download-btn:hover{ background:#4338ca; }

    .print-btn{
      background:#f3f4f6;
      color:#1e1b4b;
      border:2px solid #e5e7eb;
    }

    .print-btn:hover{ background:#e5e7eb; }

    .back-link{
      display:block;
      margin-top:1rem;
      color:#4f46e5;
      text-decoration:none;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="icon">✅</div>

  <h1>Invoice Generated!</h1>

  <p>Your PDF invoice has been created successfully.</p>

  <div class="invoice-box">
    <div class="row">
      <span class="label">Invoice ID</span>
      <span class="value">{{ invoice_id }}</span>
    </div>
    <div class="row">
      <span class="label">Total</span>
      <span class="value">₹{{ total }}</span>
    </div>
  </div>

  <div class="auto-note">
    📄 PDF opening in <span class="countdown" id="countdown">3</span> seconds
  </div>

  <div class="btn-group">
    <a href="/download/{{ filename }}" class="download-btn">
    Download PDF now
    </a>
    <button class="print-btn" onclick="window.open('/download/{{ filename }}', '_blank')">
    Print / Open PDF
    </button>
  </div>

  <a href="/" class="back-link">
    ← Create Another Invoice
  </a>

</div>

<script>
  // Countdown timer
  let seconds = 3;
  const countdownEl = document.getElementById('countdown');

  const timer = setInterval(function() {
    seconds--;
    countdownEl.textContent = seconds;

    if (seconds <= 0) {
      clearInterval(timer);
      window.location.href = '/download/{{ filename }}';
    }
  }, 1000);
</script>

</body>
</html>
