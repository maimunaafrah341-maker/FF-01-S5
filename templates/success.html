<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Generated</title>

  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:#f4f4f8;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      color:#1e1b4b;
    }

    .card{
      background:white;
      padding:2rem;
      border-radius:18px;
      width:420px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      text-align:center;
    }

    .icon{
      font-size:60px;
      margin-bottom:1rem;
    }

    h1{
      font-size:24px;
      margin-bottom:.5rem;
    }

    p{
      color:#6b7280;
      font-size:14px;
      margin-bottom:1rem;
    }

    .invoice-box{
      background:#eef2ff;
      border-radius:12px;
      padding:1rem;
      margin:1rem 0;
      text-align:left;
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin-bottom:.5rem;
      font-size:14px;
    }

    .label{
      color:#6b7280;
    }

    .value{
      font-weight:600;
    }

    .download-btn{
      display:inline-block;
      margin-top:1rem;
      background:#4f46e5;
      color:white;
      text-decoration:none;
      padding:12px 18px;
      border-radius:10px;
      font-weight:600;
      transition:.2s;
    }

    .download-btn:hover{
      background:#4338ca;
    }

    .back-link{
      display:block;
      margin-top:1rem;
      color:#4f46e5;
      text-decoration:none;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="icon">✅</div>

  <h1>Invoice Generated!</h1>

  <p>Your PDF invoice has been created successfully.</p>

  <div class="invoice-box">

    <div class="row">
      <span class="label">Invoice ID</span>
      <span class="value">{{ invoice_id }}</span>
    </div>

    <div class="row">
      <span class="label">Total</span>
      <span class="value">₹{{ total }}</span>
    </div>

  </div>

  <a href="/download/{{ filename }}" class="download-btn">
    Download PDF
  </a>

  <a href="/" class="back-link">
    ← Create Another Invoice
  </a>

</div>

</body>
</html>
